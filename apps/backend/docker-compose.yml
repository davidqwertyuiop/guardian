services:
  db:
    image: postgres:16-alpine
    container_name: guardian_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: guardian
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guardian"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guardian_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgrespassword@db:5432/guardian
      - JWT_SECRET=dev-secret-key-change-in-production
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-in-production
      - OTP_TTL_SECONDS=300
      - RATE_LIMIT_WINDOW_SECONDS=60
      - PORT=8000
      - RUST_LOG=guardian_backend=debug,tower_http=debug,axum=debug
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
