services:
  - type: web
    name: guardian-backend
    env: docker
    dockerContext: apps/backend
    dockerfilePath: Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: guardian-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OTP_TTL_SECONDS
        value: "300"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: PORT
        value: "8080"
      - key: RUST_LOG
        value: "info"
      - key: FIREBASE_PROJECT_ID
        value: "guardian-821b6"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false

databases:
  - name: guardian-db
    databaseName: guardian_db
    user: guardian_user
    plan: free
